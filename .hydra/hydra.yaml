hydra:
  run:
    dir: .
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - outdir=/tmp/claude-1000/-home-david-mnt-ssd-2-sata-python-phd/cf740145-d6b2-4daf-9639-ab7f27078ed5/scratchpad/final_hydra
    - preset=edm2-img64-s
    - data=/tmp/claude-1000/-home-david-mnt-ssd-2-sata-python-phd/cf740145-d6b2-4daf-9639-ab7f27078ed5/scratchpad/toy64.zip
    - gpus=1
    - batch=8
    - batch_gpu=8
    - duration=1Ki
    - status=1Ki
    - snapshot=1Ki
    - checkpoint=1Ki
    - num_fid_samples=0
    - eval_sampler=dpm++
    - eval_sampling_steps=25
  job:
    name: train_hydra
    chdir: false
    override_dirname: batch=8,batch_gpu=8,checkpoint=1Ki,data=/tmp/claude-1000/-home-david-mnt-ssd-2-sata-python-phd/cf740145-d6b2-4daf-9639-ab7f27078ed5/scratchpad/toy64.zip,duration=1Ki,eval_sampler=dpm++,eval_sampling_steps=25,gpus=1,num_fid_samples=0,outdir=/tmp/claude-1000/-home-david-mnt-ssd-2-sata-python-phd/cf740145-d6b2-4daf-9639-ab7f27078ed5/scratchpad/final_hydra,preset=edm2-img64-s,snapshot=1Ki,status=1Ki
    id: ???
    num: ???
    config_name: config
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.4
    version_base: '1.3'
    cwd: /home/david/mnt/ssd_2_sata/python/phd/edm2
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /home/david/mnt/ssd_2_sata/python/phd/edm2/configs
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /home/david/mnt/ssd_2_sata/python/phd/edm2
    choices:
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
